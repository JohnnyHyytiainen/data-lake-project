# docker-compose.yml
services:

  # ======== Kafka (KRaft mode - ingen Zookeeper) ======== 
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    ports:
      - "29092:29092"       # Host-maskinen når Kafka här
    environment:
      # KRaft kräver ett unikt node ID och ett cluster ID
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Två lyssnare: intern (containers) och extern (min host-maskin)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topic-inställningar
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24           # Rådata i Kafka i 24h, sen lever den i Bronze

      # KRaft cluster ID - genereras en gång, hårdkodas här
      CLUSTER_ID: "Mk3OEYBSD4fcwNTJRAYmVA"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ======== Producer ========
  producer:
    build: .
    container_name: producer
    command: uv run python -m ingestion.producer
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092       # Intern adress - inte localhost
      PYTHONUNBUFFERED: "1"    # Tvingar Python att skriva logs direkt
    depends_on:
      kafka:
        condition: service_healthy   # Väntar tills Kafka är redo


  # ======== Consumer ========
  consumer:
    build: .
    container_name: consumer
    command: uv run python -m ingestion.consumer
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      PYTHONUNBUFFERED: "1"    # Tvingar Python att skriva logs direkt
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data             # Bind mount - Parquet-filer hamnar på host-maskinen


  
  # ======== PySpark (Standalone mode) ========
  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark
    user: "0"                         # Kör som root för att undvika permission-problem med volumes
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: >
      /opt/spark/sbin/start-master.sh
    ports:
      - "8080:8080"                   # Spark Web UI - du kan se dina jobb i webbläsaren här
      - "7077:7077"                   # Spark master port - hit ansluter workers (och senare Airflow)
    volumes:
      - ./data:/app/data              # Samma bind mount som consumer - Bronze in, Silver/Gold ut

  # ======== dbt (DuckDB ADAPTER) ========
  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name : dbt
    # dbt måste köras från projektmappen för att hitta dbt_project.yml
    # och lösa relativa sökvägar rätt, precis som när jag kör
    # "dbt run" lokalt från github-data-lake/dbt/
    working_dir: /app/dbt
    profiles:
      - manual
    volumes:
      # dbt-projektet: modeller, profiles.yml, dbt_project.yml
      - ./dbt:/app/dbt
      # Data-mappen: Silver Parquet-filer in, DuckDB-filen ut.
      # Konsekvent med consumer och spark som också använder /app/data.
      # Med working_dir=/app/dbt löser ../data/silver/ till /app/data/silver/
      - ./data:/app/data

    # dbt är inte en long running service som Kafka, den kör, gör sitt jobb,
    # och avslutar. "dbt run" är default kommandot som Airflow
    # senare kan åsidosätta med t.ex --select för selektiv körning.
    command: ["dbt", "run"]

    # profiles.yml ligger inne i ./dbt/ som jag mountat till /app/dbt.
    # DBT_PROFILES_DIR talar om för dbt exakt vart den ska leta,
    # undviker att dbt letar i ~/.dbt/ (home-mappen) som inte finns i containern.
    environment:
      DBT_PROFILES_DIR: /app/dbt

# ======== Airflow - PostgreSQL state-databas ========
  postgres:
    image: postgres:16
    container_name: postgres
    env_file: .env   # Läser POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB härifrån
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ======== Airflow - Engångsinitiering ========
  airflow-init:
    image: apache/airflow:2.10.5-python3.12
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Johnny \
          --lastname H \
          --role Admin \
          --email admin@example.com
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/logs:/opt/airflow/logs
      - ./orchestration/plugins:/opt/airflow/plugins

  # ======== Airflow - Scheduler (hjärna + executor med LocalExecutor) ========
  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.12
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/logs:/opt/airflow/logs
      - ./orchestration/plugins:/opt/airflow/plugins
      # Docker socket, Schedulern behöver kunna starta containers
      # (PySpark, dbt) när den exekverar tasks i DAG:en.
      - /var/run/docker.sock:/var/run/docker.sock

  # ======== Airflow - Webserver (UI på port 8081) ========
  airflow-webserver:
    image: apache/airflow:2.10.5-python3.12
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      # Port 8080 är redan tagen av Spark Web UI, därför 8081 här.
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/logs:/opt/airflow/logs
      - ./orchestration/plugins:/opt/airflow/plugins
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      
volumes:
  postgres_data:

networks:
  default:
    name: data-lake-network